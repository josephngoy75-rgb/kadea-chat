<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="js/i18n.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Kadea Chat - Archives</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .no-select { -webkit-user-select: none; user-select: none; }
        .modal-animate { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#F8FAFC] h-screen flex overflow-hidden text-slate-900">

    <!-- NOTIFICATIONS INTERNES (toasts) -->
    <div id="toast-container" class="fixed bottom-20 md:bottom-6 left-1/2 -translate-x-1/2 z-[200] flex flex-col gap-2 items-center pointer-events-none w-full px-4"></div>

    <!-- MODAL DE SUPPRESSION -->
    <div id="delete-modal" class="hidden fixed inset-0 z-[110] bg-black/40 flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-3xl shadow-2xl p-6 modal-animate text-center border border-slate-100">
            <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-trash-can text-2xl"></i>
            </div>
            <h3 data-i18n="chat.deleteConvTitle" class="text-lg font-bold text-slate-800">Supprimer la discussion ?</h3>
            <p data-i18n="chat.deleteConfirmText" class="text-sm text-slate-500 mt-2">Cette action est définitive.</p>
            <div class="flex gap-3 mt-6">
                <button onclick="closeDeleteModal()" data-i18n="common.cancel" class="flex-1 py-3 rounded-xl font-bold text-slate-400 bg-slate-50 hover:bg-slate-200 transition-all">Annuler</button>
                <button id="confirm-delete-btn" data-i18n="common.delete" class="flex-1 py-3 rounded-xl font-bold text-white bg-red-500 hover:bg-red-700 shadow-lg transition-all">Supprimer</button>
            </div>
        </div>
    </div>

    <!-- MENU CONTEXTUEL CONVERSATION ARCHIVÉE (clic droit / appui long) -->
    <div id="conv-context-menu" class="hidden fixed z-[120] bg-white shadow-2xl rounded-xl border border-slate-100 py-1.5 min-w-[170px] text-[12px] no-select">
        <div id="conv-ctx-unarchive" class="px-4 py-2.5 hover:bg-slate-50 cursor-pointer flex items-center gap-2.5 text-slate-700">
            <i class="fa-solid fa-box-open text-slate-400 text-[11px] w-3"></i> <span data-i18n="common.unarchive">Désarchiver</span>
        </div>
        <div id="conv-ctx-delete" class="px-4 py-2.5 hover:bg-red-50 cursor-pointer flex items-center gap-2.5 text-red-500">
            <i class="fa-solid fa-trash text-[11px] w-3"></i> <span data-i18n="common.delete">Supprimer</span>
        </div>
    </div>

    <!-- BARRE GAUCHE (PC) -->
    <aside class="hidden md:flex w-[68px] flex-col items-center py-6 border-r border-slate-200 bg-white flex-shrink-0">
        <div class="space-y-7 flex flex-col items-center flex-1">
            <div class="text-blue-600 text-2xl mb-2"><i class="fa-regular fa-comment-dots"></i></div>
            <a href="chat.html" class="text-slate-300 hover:text-blue-600 text-lg"><i class="fa-solid fa-message text-sm"></i></a>
            <div class="text-slate-300 hover:text-blue-600 cursor-pointer text-lg"><i class="fa-solid fa-phone"></i></div>
            <a href="users.html" class="text-slate-300 hover:text-blue-600 text-lg"><i class="fa-solid fa-user-group"></i></a>
            <a href="archiver.html" class="bg-blue-600 text-white p-2.5 rounded-xl shadow-lg shadow-blue-100"><i class="fa-solid fa-box-archive text-sm"></i></a>
        </div>
        <a id="gear-btn" href="profile.html" class="text-slate-300 hover:text-blue-600 text-lg mb-2"><i class="fa-solid fa-gear"></i></a>
    </aside>

    <!-- CONTENU PRINCIPAL : LISTE DES CONVERSATIONS ARCHIVÉES -->
    <main class="flex-1 flex flex-col bg-white">
        <header class="p-4 border-b border-slate-100 flex items-center gap-3 h-[65px] flex-shrink-0">
            <a href="chat.html" class="text-blue-600"><i class="fa-solid fa-chevron-left text-xl"></i></a>
            <h3 data-i18n="archiver.title" class="font-bold text-slate-800 text-sm">Conversations archivées</h3>
        </header>
        <div id="archived-list" class="flex-1 overflow-y-auto custom-scrollbar no-select pb-20 md:pb-0"></div>

        <!-- NAVIGATION MOBILE -->
        <nav id="mobile-nav" class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around items-center py-3 z-50">
            <a href="chat.html" class="flex flex-col items-center text-slate-400">
                <i class="fa-solid fa-message text-xl"></i>
                <span data-i18n="nav.chats" class="text-[10px] mt-1">Chats</span>
            </a>
            <div class="flex flex-col items-center text-slate-400">
                <i class="fa-solid fa-phone text-xl"></i>
                <span data-i18n="nav.calls" class="text-[10px] mt-1">Appels</span>
            </div>
            <a href="users.html" class="flex flex-col items-center text-slate-400">
                <i class="fa-solid fa-user-group text-xl"></i>
                <span data-i18n="nav.members" class="text-[10px] mt-1">Membres</span>
            </a>
            <a href="archiver.html" class="flex flex-col items-center text-blue-600">
                <i class="fa-solid fa-box-archive text-xl"></i>
                <span data-i18n="nav.archives" class="text-[10px] font-bold mt-1">Archives</span>
            </a>
        </nav>
    </main>

    <script type="module" src="js/archiver.js"></script>
</body>
</html>
