<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <title>Kadea Chat - Créer un compte</title>
    </head>
    
    <body class="bg-slate-50 flex items-center justify-center min-h-screen p-2"> <!-- Padding body réduit -->

        <div class="w-full max-w-md">
            <!-- Logo du haut (Taille réduite : w-12, mb-4) -->
            <div class="flex flex-col items-center mb-4">
                <img src="icons/Kadea Chat Logo.png" alt="Logo Kadea Chat" class="w-12 h-12 object-contain mb-1">
                <h2 class="text-xl font-extrabold text-blue-700 tracking-tight">Kadea Chat</h2>
            </div>

            <!-- Carte d'inscription (Padding réduit : p-6) -->
            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100">
                
                <div class="mb-4"> <!-- Marge réduite -->
                    <h1 class="text-xl font-bold text-slate-800">Create Account</h1>
                    <p class="text-slate-400 text-xs mt-0.5 font-medium">Join the community and start chatting.</p>
                </div>

                <!-- Message d'erreur -->
                <div id="errorMessage" class="hidden bg-red-50 text-red-600 p-2 rounded-xl text-[10px] mb-3 border border-red-100 text-center"></div>

                <!-- Formulaire (Espacement réduit : space-y-3) -->
                <form id="registerForm" class="space-y-3">
                    <!-- Full Name -->
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 mb-1 ml-1">Full Name</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                <i class="fa-regular fa-user text-xs"></i>
                            </span>
                            <input type="text" id="fullname" required
                                class="w-full pl-9 pr-4 py-2.5 bg-slate-50 border border-slate-100 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm placeholder:text-slate-300"
                                placeholder="John Doe">
                        </div>
                    </div>

                    <!-- Email Address -->
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 mb-1 ml-1">Email Address</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                <i class="fa-regular fa-envelope text-xs"></i>
                            </span>
                            <input type="email" id="email" required
                                class="w-full pl-9 pr-4 py-2.5 bg-slate-50 border border-slate-100 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm placeholder:text-slate-300"
                                placeholder="name@example.com">
                        </div>
                    </div>

                    <!-- Password -->
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 mb-1 ml-1">Password</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                <i class="fa-solid fa-lock text-xs"></i>
                            </span>
                            <input type="password" id="password" required
                                class="w-full pl-9 pr-10 py-2.5 bg-slate-50 border border-slate-100 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm placeholder:text-slate-300"
                                placeholder="••••••••">
                            <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400">
                                <i class="fa-regular fa-eye text-xs"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div>
                        <label class="block text-[10px] font-bold text-slate-500 mb-1 ml-1">Confirm Password</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                <i class="fa-solid fa-rotate-right text-[9px]"></i>
                            </span>
                            <input type="password" id="confirmPassword" required
                                class="w-full pl-9 pr-10 py-2.5 bg-slate-50 border border-slate-100 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm placeholder:text-slate-300"
                                placeholder="••••••••">
                            <button type="button" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400">
                                <i class="fa-regular fa-eye text-xs"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Button (Taille ajustée : py-3) -->
                    <button type="submit" id="submitBtn"
                        class="w-full bg-blue-700 text-white py-3 rounded-xl font-bold shadow-md hover:bg-blue-800 active:scale-[0.98] transition-all flex justify-center items-center gap-2 text-sm">
                        Create Account <i class="fa-solid fa-arrow-right text-xs"></i>
                    </button>
                </form>

                <p class="text-[9px] text-center text-slate-400 mt-4 px-2 leading-tight">
                    By signing up, you agree to our <a href="#" class="text-blue-600 font-bold">Terms</a> and <a href="#" class="text-blue-600 font-bold">Privacy</a>.
                </p>
            </div>

            <!-- Footer Link (Marge réduite : mt-4) -->
            <p class="mt-4 text-center text-xs text-slate-600 font-medium">
                Already have an account? <a href="login.html" class="font-bold text-blue-600 hover:underline">Log in</a>
            </p>
        </div>

    </body>
</html>
