<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.tailwindcss.com"></script>
        <script>tailwind.config = { darkMode: 'class' }</script>
        <script src="js/theme.js"></script>
        <script src="js/i18n.js"></script>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link rel="stylesheet" href="css/index.css">
        <title>Kadea Chat - Créer un compte</title>
    </head>

    <body class="bg-slate-50 dark:bg-slate-900 flex items-center justify-center min-h-screen p-2 transition-colors">

        <div class="w-full max-w-md">
            <div class="flex flex-col items-center mb-4">
                <img src="icons/Kadea Chat Logo.png" alt="Logo Kadea Chat" class="w-12 h-12 object-contain mb-1">
                <h2 class="text-xl font-extrabold text-blue-700 tracking-tight">Kadea Chat</h2>
            </div>

            <div class="bg-white dark:bg-slate-800 p-6 rounded-[2rem] shadow-sm border border-slate-100 dark:border-slate-700 dark:shadow-none">
                
                <div class="mb-4">
                    <h1 data-i18n="register.title" class="text-xl font-bold text-slate-800 dark:text-slate-100">Create Account</h1>
                    <p data-i18n="register.subtitle" class="text-slate-400 dark:text-slate-500 text-xs mt-0.5 font-medium">Join the community and start chatting.</p>
                </div>

                <!-- Message d'erreur -->
                <div id="errorMessage" class="hidden bg-red-50 text-red-600 p-2 rounded-xl text-[10px] mb-3 border border-red-100 text-center"></div>

                <form id="registerForm" class="space-y-3">
                    <!-- Full Name -->
                    <div>
                        <label data-i18n="register.fullNameLabel" class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1 ml-1">Full Name</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                <i class="fa-regular fa-user text-xs"></i>
                            </span>
                            <input type="text" id="fullname" required
                                class="w-full pl-9 pr-4 py-2.5 bg-slate-50 dark:bg-slate-700 dark:text-slate-100 border border-slate-100 dark:border-slate-600 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm placeholder:text-slate-300 dark:placeholder:text-slate-500"
                                placeholder="John Doe">
                        </div>
                    </div>

                    <!-- Email Address -->
                    <div>
                        <label data-i18n="register.emailLabel" class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1 ml-1">Email Address</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                <i class="fa-regular fa-envelope text-xs"></i>
                            </span>
                            <input type="email" id="email" required
                                class="w-full pl-9 pr-4 py-2.5 bg-slate-50 dark:bg-slate-700 dark:text-slate-100 border border-slate-100 dark:border-slate-600 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm placeholder:text-slate-300 dark:placeholder:text-slate-500"
                                placeholder="name@example.com">
                        </div>
                    </div>

                    <!-- Password -->
                    <div>
                        <label data-i18n="register.passwordLabel" class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1 ml-1">Password</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                <i class="fa-solid fa-lock text-xs"></i>
                            </span>
                            <input type="password" id="password" required
                                class="w-full pl-9 pr-10 py-2.5 bg-slate-50 dark:bg-slate-700 dark:text-slate-100 border border-slate-100 dark:border-slate-600 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm placeholder:text-slate-300 dark:placeholder:text-slate-500"
                                placeholder="••••••••">
                            <button type="button" id="togglePass" data-loader-ignore="true" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400">
                                <i class="fa-regular fa-eye text-xs"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Confirm Password -->
                    <div>
                        <label data-i18n="register.confirmPasswordLabel" class="block text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1 ml-1">Confirm Password</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                                <i class="fa-solid fa-rotate-right text-[9px]"></i>
                            </span>
                            <input type="password" id="confirmPassword" required
                                class="w-full pl-9 pr-10 py-2.5 bg-slate-50 dark:bg-slate-700 dark:text-slate-100 border border-slate-100 dark:border-slate-600 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-sm placeholder:text-slate-300 dark:placeholder:text-slate-500"
                                placeholder="••••••••">
                            <button type="button" id="toggleConfirm" data-loader-ignore="true" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400">
                                <i class="fa-regular fa-eye text-xs"></i>
                            </button>
                        </div>
                    </div>

                    <!-- Button -->
                    <button type="submit" id="submitBtn"
                        class="w-full bg-blue-700 text-white py-3 rounded-xl font-bold shadow-md dark:shadow-none hover:bg-blue-800 active:scale-[0.98] transition-all flex justify-center items-center gap-2 text-sm">
                        <span data-i18n="register.button">Create Account</span> <i class="fa-solid fa-arrow-right text-xs"></i>
                    </button>
                </form>

                <p class="text-[9px] text-center text-slate-400 mt-4 px-2 leading-tight">
                    <span data-i18n="register.termsPrefix">By signing up, you agree to our</span>
                    <a href="#" data-i18n="register.terms" class="text-blue-600 dark:text-blue-400 font-bold">Terms</a>
                    <span data-i18n="register.and">and</span>
                    <a href="#" data-i18n="register.privacy" class="text-blue-600 dark:text-blue-400 font-bold">Privacy</a>.
                </p>
            </div>

            <!-- Footer Link -->
            <p class="mt-4 text-center text-xs text-slate-600 dark:text-slate-400 font-medium">
                <span data-i18n="register.haveAccount">Already have an account?</span> <a href="login.html" data-i18n="register.login" class="font-bold text-blue-600 dark:text-blue-400 hover:underline">Log in</a>
            </p>
        </div>

        <script type="module" src="js/register.js"></script>
    </body>
</html>
