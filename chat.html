<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Kadea Chat - Messagerie</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-white h-screen flex overflow-hidden text-slate-900">

    <!-- ==========================================
         PARTIE 1 : BARRE D'ICÔNES (EXTRÊME GAUCHE)
         ========================================== -->
    <aside class="w-16 flex flex-col items-center py-5 border-r border-slate-100 bg-white flex-shrink-0">
        <div class="mb-8">
            <div class="text-blue-600 text-lg"><i class="fa-solid fa-comment-dots"></i></div>
        </div>
        <div class="flex flex-col items-center space-y-6 flex-1 w-full">
            <div class="relative group">
                <div class="bg-blue-600 text-white w-10 h-10 rounded-xl flex items-center justify-center shadow-md shadow-blue-100 cursor-pointer">
                    <i class="fa-solid fa-message text-[14px]"></i>
                </div>
                <div class="absolute -left-[14px] top-1/2 -translate-y-1/2 w-1 h-6 bg-blue-600 rounded-r-full"></div>
            </div>
            <div class="text-slate-300 hover:text-blue-500 cursor-pointer transition-all"><i class="fa-solid fa-phone text-[16px]"></i></div>
            <div class="text-slate-300 hover:text-blue-500 cursor-pointer transition-all"><i class="fa-regular fa-user text-[17px]"></i></div>
            <div class="text-slate-300 hover:text-blue-500 cursor-pointer transition-all"><i class="fa-solid fa-box-archive text-[16px]"></i></div>
        </div>
        <!-- ID: gear-btn pour la navigation profil -->
        <div id="gear-btn" class="text-slate-300 hover:text-blue-500 cursor-pointer transition-all mb-2">
            <i class="fa-solid fa-gear text-[17px]"></i>
        </div>
    </aside>

    <!-- ==========================================
         PARTIE 2 : SIDEBAR DES DISCUSSIONS (MILIEU)
         ========================================== -->
    <aside class="w-80 border-r border-slate-100 flex flex-col flex-shrink-0 bg-white">
        <!-- Header Utilisateur -->
        <div class="p-5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="relative">
                    <img id="user-avatar-img" src="https://i.pravatar.cc/100?u=joseph" class="w-10 h-10 rounded-full border border-slate-100 object-cover">
                    <span class="absolute bottom-0 right-0 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></span>
                </div>
                <div>
                    <!-- ID: user-fullname-display pour afficher ton nom -->
                    <h3 id="user-fullname-display" class="font-bold text-slate-800 text-[13px]">Joseph Ngoy</h3>
                    <p class="text-[10px] text-slate-400 font-medium">My Status: <span class="text-green-500">Active</span></p>
                </div>
            </div>
            <div class="text-slate-400 hover:text-blue-600 cursor-pointer"><i class="fa-regular fa-pen-to-square text-[16px]"></i></div>
        </div>

        <!-- Recherche -->
        <div class="px-5 mb-4">
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-[12px]"></i>
                <!-- ID: search-input pour la logique de recherche -->
                <input type="text" id="search-input" placeholder="Search conversations..." 
                    class="w-full bg-slate-50 border-none rounded-xl py-2.5 pl-10 pr-4 text-[12px] outline-none focus:ring-1 focus:ring-blue-100 placeholder:text-slate-400 transition-all">
            </div>
        </div>

        <!-- ID: conversations-list pour injecter les discussions -->
        <div id="conversations-list" class="flex-1 overflow-y-auto custom-scrollbar">
            <div class="p-8 text-center text-slate-300 text-xs italic">Chargement des conversations...</div>
        </div>
    </aside>

    <!-- ==========================================
         PARTIE 3 : FENÊTRE DE CHAT (DROITE)
         ========================================== -->
    <main class="flex-1 flex flex-col bg-white">
        <!-- Header Chat -->
        <header class="p-4 border-b border-slate-100 flex justify-between items-center bg-white">
            <div class="flex items-center gap-3">
                <div class="relative">
                    <img src="https://i.pravatar.cc/100?u=sarah" class="w-10 h-10 rounded-full object-cover">
                    <span class="absolute bottom-0 right-0 w-2.5 h-2.5 bg-green-500 border-2 border-white rounded-full"></span>
                </div>
                <div>
                    <!-- ID: chat-contact-name pour changer le nom au clic -->
                    <h3 id="chat-contact-name" class="font-bold text-slate-800 text-[13px]">Sélectionnez un contact</h3>
                    <div class="flex items-center gap-1.5">
                        <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
                        <span class="text-[10px] text-slate-400 font-medium">Online</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-6 text-slate-400 mr-2">
                <i class="fa-solid fa-video hover:text-blue-600 cursor-pointer text-[16px]"></i>
                <i class="fa-solid fa-phone hover:text-blue-600 cursor-pointer text-[16px]"></i>
                <i class="fa-solid fa-ellipsis-vertical hover:text-blue-600 cursor-pointer text-[16px]"></i>
            </div>
        </header>

        <!-- ID: messages-container pour injecter les messages -->
        <div id="messages-container" class="flex-1 overflow-y-auto p-6 space-y-6 bg-white custom-scrollbar">
            <div class="h-full flex items-center justify-center text-slate-300 text-xs italic">
                Sélectionnez une discussion pour commencer à lire.
            </div>
        </div>

        <!-- Zone de Saisie -->
        <div class="p-4 bg-white">
            <div class="flex items-center gap-4 bg-slate-50 p-2 rounded-2xl border border-slate-100">
                <div class="flex items-center gap-3 pl-2 text-slate-400">
                    <i class="fa-solid fa-circle-plus text-[20px] hover:text-blue-600 cursor-pointer"></i>
                    <i class="fa-regular fa-face-smile text-[20px] hover:text-blue-600 cursor-pointer"></i>
                </div>
                <!-- ID: message-input -->
                <input type="text" id="message-input" placeholder="Type a message..." 
                    class="flex-1 bg-transparent border-none text-[13px] outline-none focus:ring-0 placeholder:text-slate-400">
                <!-- ID: send-btn -->
                <button id="send-btn" class="bg-blue-600 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg hover:bg-blue-700 transition-all active:scale-95">
                    <i class="fa-solid fa-paper-plane text-[14px]"></i>
                </button>
            </div>
        </div>
    </main>

    <script type="module" src="js/chat.js"></script>
</body>
</html>
