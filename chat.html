<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Kadea Chat - Premium</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .no-select { -webkit-user-select: none; user-select: none; }
        .modal-animate { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-[#F8FAFC] h-screen flex overflow-hidden text-slate-900">

    <!-- MODAL DE CONFIRMATION INTERNE (SUPPRESSION) -->
    <div id="delete-modal" class="hidden fixed inset-0 z-[110] bg-black/40 flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm rounded-3xl shadow-2xl p-6 modal-animate text-center">
            <div class="w-16 h-16 bg-red-50 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-trash-can text-2xl"></i>
            </div>
            <h3 class="text-lg font-bold text-slate-800">Supprimer la discussion ?</h3>
            <p class="text-sm text-slate-500 mt-2">Cette action est irréversible. Tous vos messages seront perdus.</p>
            <div class="flex gap-3 mt-6">
                <button onclick="closeDeleteModal()" class="flex-1 py-3 rounded-xl font-bold text-slate-400 bg-slate-50 hover:bg-slate-100 transition">Annuler</button>
                <button id="confirm-delete-btn" class="flex-1 py-3 rounded-xl font-bold text-white bg-red-500 hover:bg-red-600 shadow-lg shadow-red-100 transition">Supprimer</button>
            </div>
        </div>
    </div>

    <!-- MENU CONTEXTUEL MOBILE -->
    <div id="mobile-context-menu" class="hidden fixed inset-0 z-[100] bg-black/20 flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-white w-full max-w-xs rounded-3xl shadow-2xl overflow-hidden modal-animate">
            <div class="p-4 border-b border-slate-50 text-center font-bold text-slate-800 text-sm" id="context-menu-title">Options</div>
            <button id="archive-menu-btn" class="w-full p-4 text-left flex items-center gap-3 hover:bg-slate-50 border-b border-slate-50">
                <i class="fa-solid fa-box-archive text-blue-500"></i> <span class="font-medium text-sm">Archiver</span>
            </button>
            <button onclick="openDeleteModal()" class="w-full p-4 text-left flex items-center gap-3 hover:bg-red-50 text-red-500">
                <i class="fa-solid fa-trash-can"></i> <span class="font-medium text-sm">Supprimer</span>
            </button>
            <button onclick="closeContextMenu()" class="w-full p-4 text-center text-xs text-slate-400 font-bold uppercase bg-slate-50">Annuler</button>
        </div>
    </div>

    <!-- BARRE GAUCHE (PC) -->
    <aside class="hidden md:flex w-[68px] flex-col items-center py-6 border-r border-slate-200 bg-white flex-shrink-0">
        <div class="space-y-7 flex flex-col items-center flex-1">
            <div class="text-blue-600 text-2xl mb-2"><i class="fa-regular fa-comment-dots"></i></div>
            <div class="bg-blue-600 text-white p-2.5 rounded-xl shadow-lg shadow-blue-100 cursor-pointer"><i class="fa-solid fa-message text-sm"></i></div>
            <div class="text-slate-300 hover:text-blue-600 cursor-pointer text-lg"><i class="fa-solid fa-phone"></i></div>
            <div class="text-slate-300 hover:text-blue-600 cursor-pointer text-lg"><i class="fa-solid fa-user-group"></i></div>
            <a href="archiver.html" class="text-slate-300 hover:text-blue-600 text-lg"><i class="fa-solid fa-box-archive"></i></a>
        </div>
        <div id="gear-btn" class="text-slate-300 hover:text-blue-600 cursor-pointer text-lg mb-2"><i class="fa-solid fa-gear"></i></div>
    </aside>

    <!-- SIDEBAR DISCUSSIONS -->
    <aside id="sidebar-mid" class="flex-1 md:w-80 md:flex-none border-r border-slate-200 flex flex-col flex-shrink-0 bg-white relative">
        <div class="p-4 flex justify-between items-center">
            <div class="flex items-center gap-2.5">
                <img id="user-avatar-img" src="https://i.pravatar.cc/100?u=me" class="w-9 h-9 rounded-full border border-slate-100 object-cover">
                <h3 id="user-fullname-display" class="font-bold text-slate-800 text-[12px]">Chargement...</h3>
            </div>
            <button class="text-slate-300 hover:text-blue-600"><i class="fa-regular fa-pen-to-square"></i></button>
        </div>
        <div class="px-4 mb-3">
            <div class="relative">
                <i id="search-btn" class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-300 text-xs"></i>
                <input type="text" id="search-input" placeholder="Search conversations..." class="w-full bg-slate-50 border-none rounded-lg py-2.5 pl-9 pr-4 text-[11px] outline-none">
            </div>
        </div>
        <div id="conversations-list" class="flex-1 overflow-y-auto custom-scrollbar pb-20 md:pb-0 no-select"></div>

        <nav id="mobile-nav" class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-slate-100 flex justify-around items-center py-3 z-50">
            <div class="flex flex-col items-center text-blue-600"><i class="fa-solid fa-message text-xl"></i><span class="text-[10px] font-bold mt-1">Discussions</span></div>
            <div class="flex flex-col items-center text-slate-400"><i class="fa-solid fa-phone text-xl"></i><span class="text-[10px] mt-1">Appels</span></div>
            <div class="flex flex-col items-center text-slate-400"><i class="fa-solid fa-user-group text-xl"></i><span class="text-[10px] mt-1">Communautés</span></div>
            <div id="gear-mobile" class="flex flex-col items-center text-slate-400 cursor-pointer"><i class="fa-solid fa-gear text-xl"></i><span class="text-[10px] mt-1">Réglages</span></div>
        </nav>
    </aside>

    <!-- FENÊTRE DE CHAT -->
    <main id="chat-window" class="hidden md:flex flex-1 flex-col bg-white">
        <header class="p-3 border-b border-slate-100 flex justify-between items-center bg-white h-[65px]">
            <div class="flex items-center gap-3">
                <button id="back-to-list" class="md:hidden text-blue-600 pr-2"><i class="fa-solid fa-chevron-left text-xl"></i></button>
                <div id="chat-contact-avatar" class="w-9 h-9 rounded-full bg-blue-50 flex items-center justify-center text-blue-600 font-bold text-[10px] uppercase"><span id="contact-initials">?</span></div>
                <div>
                    <h3 id="chat-contact-name" class="font-bold text-slate-800 text-xs">Contact</h3>
                    <div class="flex items-center gap-1.5">
                        <span id="online-dot" class="w-1.5 h-1.5 bg-slate-300 rounded-full"></span>
                        <span id="chat-contact-status" class="text-[9px] text-slate-400 font-medium">Offline</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-5 text-slate-300 mr-2">
                <i onclick="openDeleteModal()" class="fa-solid fa-trash-can text-sm hover:text-red-500 cursor-pointer transition-colors"></i>
                <i class="fa-solid fa-video text-sm hover:text-blue-500 cursor-pointer"></i>
                <i class="fa-solid fa-phone text-sm hover:text-blue-500 cursor-pointer"></i>
            </div>
        </header>

        <div id="messages-container" class="flex-1 overflow-y-auto p-5 space-y-5 bg-white custom-scrollbar"></div>

        <div class="p-4 pb-16 md:pb-4 bg-white border-t border-slate-50">
            <div class="flex items-center gap-3 bg-slate-50 p-1.5 rounded-2xl border border-slate-100">
                <div class="flex items-center gap-3 pl-2 text-slate-400">
                    <i class="fa-solid fa-circle-plus text-xl hover:text-blue-600 cursor-pointer"></i>
                    <i class="fa-regular fa-face-smile text-xl hover:text-blue-600 cursor-pointer"></i>
                </div>
                <input type="text" id="message-input" placeholder="Type a message..." class="flex-1 bg-transparent border-none text-[12px] outline-none">
                <button id="send-btn" class="bg-blue-600 text-white w-9 h-9 rounded-full flex items-center justify-center shadow-lg active:scale-90 transition-transform">
                    <i class="fa-solid fa-paper-plane text-[11px]"></i>
                </button>
            </div>
        </div>
    </main>

    <script type="module" src="js/chat.js"></script>
</body>
</html>
