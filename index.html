<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link rel="stylesheet" href="css/dark.css">
        <title>Kadea Chat - Accueil</title>
    </head>
    <body>
        <header class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-100">
            <div class="flex justify-between items-center px-8 py-4 max-w-7xl mx-auto w-full">
                
                <div class="flex items-center gap-3">
                    <img src="icons/Kadea Chat Logo.png" alt="Logo" class="w-9 h-9 object-contain">
                    <span class="text-xl font-extrabold text-blue-700 tracking-tight">Kadea Chat</span>
                </div>

                <div class="flex items-center gap-6">
            
                    <button id="darkModeBtn" class="hover:opacity-70 transition">
                        <img src="icons/circum_dark.png" alt="Mode sombre" class="w-7 h-7"> 
                    </button>
                    <a href="register.html" id="data-i18n" class="bg-blue-600 text-white px-5 py-2 rounded-lg text-sm font-bold hover:bg-blue-700 transition shadow-md shadow-blue-100">
                        Sign Up
                    </a>
                </div>
            </div>
        </header>

        <div class="pt-24"></div>  
        
        <main class="max-w-7xl mx-auto px-8 pt-6 pb-6"> 
            <div class="grid lg:grid-cols-2 gap-12 items-center">
                
                <!-- COLONNE GAUCHE : TEXTE -->
                <div class="flex flex-col items-start space-y-8">
                
                    <h1 id="data-i18n" class="text-5xl md:text-6xl font-extrabold text-[#0052cc] leading-[1.1] tracking-tight ">
                        A space for <br> exchanges <br> between learners.
                    </h1>

                    <p id="data-i18n" class="text-lg text-slate-500 font-medium leading-relaxed max-w-md">
                        Kadea Chat allows you to collaborate with your peers, share your knowledge and grow together within your digital community.
                    </p>

                    <div class="flex flex-wrap gap-4 pt-2">
                        <!-- Se connecter -->
                        <a href="login.html" id="data-i18n" class="bg-[#444956] text-white px-7 py-3 rounded-xl font-bold hover:bg-slate-800 transition shadow-md shadow-slate-200">
                           Login
                        </a>
                        
                        <!-- Inscription -->
                        <a href="register.html" id="data-i18n" class="bg-[#0052cc] text-white px-7 py-3 rounded-xl font-bold hover:bg-blue-700 transition shadow-md shadow-blue-100">
                            Sign Up
                        </a>
                    </div>
                </div>

                <!-- COLONNE DROITE : L'IMAGE -->
                <div class="flex justify-end lg:pl-12">
                    <img src="imgs/Capture-1.png" alt="Aperçu Kadea Chat" 
                        class="w-full h-auto rounded-2xl shadow-2xl border border-slate-50 transform hover:scale-[1.02] transition-transform duration-500">
                </div>
            </div>
        </main>

        <footer class="w-full border-t border-black mt-8 py-4"> 
            <div class="max-w-7xl mx-auto px-8 flex flex-col md:flex-row justify-between items-center gap-4">
                
                <div class="relative flex items-center">
                    <select id="language-select" class="appearance-none bg-transparent border border-slate-300 pl-3 pr-8 py-1 rounded text-[12px] font-medium text-slate-600 outline-none cursor-pointer hover:border-slate-400 transition-all">
                        <option id="data-i18n">english</option>
                        <option id="data-i18n">french</option>
                    </select>
                    <!-- Flèche cliquable -->
                    <div class="absolute right-2 pointer-events-none">
                        <i class="fa-solid fa-caret-down text-[10px] text-slate-500"></i>
                    </div>
                </div>

                <div class="text-center">
                    <p class="text-slate-400 font-medium text-[10px] uppercase tracking-[2px]">
                        © 2026 By Ngoy Ndala joseph
                    </p>
                </div>

                <div class="flex items-center gap-5">
                    <a href="#" class="hover:opacity-70 transition-opacity">
                        <img src="icons/Vector (1).png" alt="Email" class="w-5 h-5 object-contain">
                    </a>
                    <a href="#" class="hover:opacity-70 transition-opacity">
                        <img src="icons/Vector (2).png" alt="LinkedIn" class="w-5 h-5 object-contain">
                    </a>
                    <a href="#" class="hover:opacity-70 transition-opacity">
                        <img src="icons/Vector (3).png" alt="Instagram" class="w-5 h-5 object-contain">
                    </a>
                </div>
            </div>
        </footer>

        <script src="js/app.js"></script>
    </body>
</html>
