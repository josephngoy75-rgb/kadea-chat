<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="js/theme.js"></script>
    <script src="js/i18n.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Kadea Chat - Mot de passe oublié</title>
</head>
<body class="bg-slate-50 dark:bg-slate-900 flex items-center justify-center min-h-screen p-4 transition-colors">

    <div class="w-full max-w-md">
        <!-- Section Logo et Titre -->
        <div class="flex flex-col items-center mb-10">
            <div class="bg-blue-600 p-2.5 rounded-xl shadow-lg dark:shadow-none mb-4">
                <i class="fa-solid fa-comment-dots text-white text-2xl"></i>
            </div>
            <h1 data-i18n="forgot.title" class="text-3xl font-extrabold text-[#0052cc] tracking-tight">Mot de passe oublié</h1>
            <p data-i18n="forgot.subtitle" class="text-slate-500 dark:text-slate-400 text-sm mt-2 font-medium text-center">Entrez votre adresse email, nous vous enverrons un code de vérification.</p>
        </div>

        <!-- Carte -->
        <div class="bg-white dark:bg-slate-800 p-10 rounded-[2.5rem] shadow-sm border border-slate-100 dark:border-slate-700 dark:shadow-none">

            <!-- Message de statut -->
            <div id="errorMessage" class="hidden bg-red-50 text-red-600 p-3 rounded-xl text-xs mb-4 border border-red-100 text-center"></div>

            <form id="forgotForm" class="space-y-6">
                <!-- Email Address -->
                <div>
                    <label data-i18n="forgot.emailLabel" class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-2 ml-1 uppercase tracking-wide">Email Address</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i class="fa-regular fa-envelope text-sm"></i>
                        </span>
                        <input type="email" id="email" required
                            class="w-full pl-11 pr-4 py-3.5 bg-slate-50 dark:bg-slate-700 dark:text-slate-100 border border-slate-100 dark:border-slate-600 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-300 dark:placeholder:text-slate-500"
                            placeholder="name@company.com">
                    </div>
                </div>

                <!-- Bouton -->
                <button type="submit" id="sendCodeBtn"
                    class="w-full bg-[#1d4ed8] text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-100 dark:shadow-none hover:bg-blue-800 active:scale-[0.98] transition-all text-lg">
                    <span data-i18n="forgot.button">Envoyer le code</span>
                </button>
            </form>
        </div>

        <!-- Footer Link -->
        <p class="mt-8 text-center text-sm text-slate-600 dark:text-slate-400 font-medium">
            <a href="login.html" class="font-bold text-blue-600 hover:underline"><i class="fa-solid fa-arrow-left mr-1"></i> <span data-i18n="forgot.backToLogin">Retour à la connexion</span></a>
        </p>
    </div>

    <script type="module" src="js/forgot-password.js"></script>
</body>
</html>
