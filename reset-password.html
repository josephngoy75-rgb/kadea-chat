<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class' }</script>
    <script src="js/theme.js"></script>
    <script src="js/i18n.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Kadea Chat - Réinitialiser le mot de passe</title>
</head>
<body class="bg-slate-50 dark:bg-slate-900 flex items-center justify-center min-h-screen p-4 transition-colors">

    <div class="w-full max-w-md">
        <!-- Section Logo et Titre -->
        <div class="flex flex-col items-center mb-10">
            <div class="bg-blue-600 p-2.5 rounded-xl shadow-lg dark:shadow-none mb-4">
                <i class="fa-solid fa-key text-white text-2xl"></i>
            </div>
            <h1 data-i18n="reset.title" class="text-3xl font-extrabold text-[#0052cc] tracking-tight">Nouveau mot de passe</h1>
            <p class="text-slate-500 dark:text-slate-400 text-sm mt-2 font-medium text-center"><span data-i18n="reset.subtitleBefore">Entrez le code reçu à</span> <span id="target-email" class="font-bold"></span> <span data-i18n="reset.subtitleAfter">et choisissez un nouveau mot de passe.</span></p>
        </div>

        <!-- Carte -->
        <div class="bg-white dark:bg-slate-800 p-10 rounded-[2.5rem] shadow-sm border border-slate-100 dark:border-slate-700 dark:shadow-none">

            <!-- Message de statut -->
            <div id="errorMessage" class="hidden bg-red-50 text-red-600 p-3 rounded-xl text-xs mb-4 border border-red-100 text-center"></div>

            <form id="resetForm" class="space-y-6">
                <!-- Code de vérification -->
                <div>
                    <label data-i18n="reset.codeLabel" class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-2 ml-1 uppercase tracking-wide">Code de vérification</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i class="fa-solid fa-shield-halved text-sm"></i>
                        </span>
                        <input type="text" id="code" maxlength="6" required
                            class="w-full pl-11 pr-4 py-3.5 bg-slate-50 dark:bg-slate-700 dark:text-slate-100 border border-slate-100 dark:border-slate-600 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-300 dark:placeholder:text-slate-500 tracking-[0.5em] text-center font-bold"
                            placeholder="123456">
                    </div>
                </div>

                <!-- Nouveau mot de passe -->
                <div>
                    <label data-i18n="reset.newPasswordLabel" class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-2 ml-1 uppercase tracking-wide">Nouveau mot de passe</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i class="fa-solid fa-lock text-sm"></i>
                        </span>
                        <input type="password" id="newPassword" required
                            class="w-full pl-11 pr-12 py-3.5 bg-slate-50 dark:bg-slate-700 dark:text-slate-100 border border-slate-100 dark:border-slate-600 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-300 dark:placeholder:text-slate-500"
                            placeholder="••••••••">
                        <button type="button" id="toggleNewPass" data-loader-ignore="true" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400">
                            <i class="fa-regular fa-eye text-sm"></i>
                        </button>
                    </div>
                </div>

                <!-- Confirmation -->
                <div>
                    <label data-i18n="reset.confirmPasswordLabel" class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-2 ml-1 uppercase tracking-wide">Confirmer le mot de passe</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-400">
                            <i class="fa-solid fa-lock text-sm"></i>
                        </span>
                        <input type="password" id="confirmPassword" required
                            class="w-full pl-11 pr-12 py-3.5 bg-slate-50 dark:bg-slate-700 dark:text-slate-100 border border-slate-100 dark:border-slate-600 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-300 dark:placeholder:text-slate-500"
                            placeholder="••••••••">
                        <button type="button" id="toggleConfirmPass" data-loader-ignore="true" class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400">
                            <i class="fa-regular fa-eye text-sm"></i>
                        </button>
                    </div>
                </div>

                <!-- Bouton -->
                <button type="submit" id="resetBtn"
                    class="w-full bg-[#1d4ed8] text-white py-4 rounded-2xl font-bold shadow-lg shadow-blue-100 dark:shadow-none hover:bg-blue-800 active:scale-[0.98] transition-all text-lg">
                    <span data-i18n="reset.button">Réinitialiser le mot de passe</span>
                </button>
            </form>
        </div>

        <!-- Footer Link -->
        <p class="mt-8 text-center text-sm text-slate-600 dark:text-slate-400 font-medium">
            <a href="login.html" class="font-bold text-blue-600 hover:underline"><i class="fa-solid fa-arrow-left mr-1"></i> <span data-i18n="reset.backToLogin">Retour à la connexion</span></a>
        </p>
    </div>

    <script type="module" src="js/reset-password.js"></script>
</body>
</html>
